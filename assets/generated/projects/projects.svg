<svg xmlns="http://www.w3.org/2000/svg" width="820" height="350" viewBox="0 0 820 350">
    <style>
        .terminal-text { font-family: Courier New, monospace; font-size: 14px; fill: #c9d1d9; }
        .terminal-text-bold { font-family: Courier New, monospace; font-size: 14px; font-weight: 700; fill: #c9d1d9; }
        .terminal-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; }
        .terminal-header { fill: #161b22; }
        
        /* Color classes */
        .color-primary { fill: #58a6ff; }
        .color-success { fill: #3fb950; }
        .color-error { fill: #f85149; }
        .color-warning { fill: #d29922; }
        .color-secondary { fill: #8b949e; }
        .color-purple { fill: #bc8cff; }
        .color-blue { fill: #58a6ff; }
    </style>
    
    <!-- Window Background with Border -->
    <rect width="819" height="349" x="0.5" y="0.5" class="terminal-bg" rx="8"/>
    
    <!-- Header -->
    <path class="terminal-header" d="M 0.5 8 Q 0.5 0.5 8 0.5 L 811.5 0.5 Q 819.5 0.5 819.5 8 L 819.5 32 L 0.5 32 Z" />
    <line x1="0.5" y1="32" x2="819.5" y2="32" stroke="#30363d" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="20" cy="16" r="6" fill="#f85149" />
    <circle cx="40" cy="16" r="6" fill="#d29922" />
    <circle cx="60" cy="16" r="6" fill="#3fb950" />
    
    <!-- Inner Content -->
    <g transform="translate(0, 32)">
        
        <style>
            @keyframes fade {
                0% { opacity: 0; }
                100% { opacity: 1; }
            }
            .cmd, .r {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                animation: fade 0.3s backwards;
            }
            .name { font-weight: bold; font-size: 15px; }
            a { text-decoration: none; cursor: pointer; }
            a:hover { text-decoration: underline; }
        </style>
        <g xml:space="preserve">
        <text x="20" y="34" class="cmd" style="animation-delay: 0s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan><tspan class="color-primary"> ls projects --featured</tspan></text>
<text x="20" y="74" class="r name color-primary" style="animation-delay: 0.4s;">SafeMine</text>
<text x="20" y="94" class="r color-secondary" style="animation-delay: 0.5s;">AI-powered mine safety monitoring system</text>
<text x="20" y="118" class="r" style="animation-delay: 0.6s;"><tspan class="color-secondary">Stack : </tspan><tspan class="color-blue">Python • Flask • OpenCV • YOLO • MongoDB</tspan></text>
<text x="20" y="138" class="r" style="animation-delay: 0.7s;"><tspan class="color-secondary">Links : </tspan><a href="https://github.com/omi290/safemine" target="_blank"><tspan class="color-primary">Repository ↗</tspan></a> | <a href="https://safemine.vercel.app" target="_blank"><tspan class="color-primary">Live ↗</tspan></a></text>
<text x="20" y="158" class="r" style="animation-delay: 0.7999999999999999s;"><tspan class="color-secondary">Status: </tspan><tspan class="color-success">● Active Development</tspan></text>
<text x="20" y="190" class="r color-secondary" style="animation-delay: 0.8999999999999999s;">------------------------------------------------------------</text>
<text x="20" y="214" class="r name color-primary" style="animation-delay: 0.9999999999999999s;">AI Assignment Evaluator</text>
<text x="20" y="234" class="r color-secondary" style="animation-delay: 1.0999999999999999s;">Automated pipeline for evaluating and grading code assignments using LLMs.</text>
<text x="20" y="258" class="r" style="animation-delay: 1.2s;"><tspan class="color-secondary">Stack : </tspan><tspan class="color-blue">Python • LangChain • OpenAI • React • Node.js</tspan></text>
<text x="20" y="278" class="r" style="animation-delay: 1.3s;"><tspan class="color-secondary">Links : </tspan><a href="https://github.com/omi290/ai-evaluator" target="_blank"><tspan class="color-primary">Repository ↗</tspan></a> | <a href="https://aieval.vercel.app" target="_blank"><tspan class="color-primary">Live ↗</tspan></a></text>
<text x="20" y="298" class="r" style="animation-delay: 1.4000000000000001s;"><tspan class="color-secondary">Status: </tspan><tspan class="color-success">● Completed</tspan></text>
</g>
    </g>
</svg>