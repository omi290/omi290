<svg xmlns="http://www.w3.org/2000/svg" width="820" height="518" viewBox="0 0 820 518">
    <style>
        .terminal-text { font-family: Courier New, monospace; font-size: 14px; fill: #c9d1d9; }
        .terminal-text-bold { font-family: Courier New, monospace; font-size: 14px; font-weight: 700; fill: #c9d1d9; }
        .terminal-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; }
        .terminal-header { fill: #161b22; }
        
        /* Color classes */
        .color-primary { fill: #58a6ff; }
        .color-success { fill: #3fb950; }
        .color-error { fill: #f85149; }
        .color-warning { fill: #d29922; }
        .color-secondary { fill: #8b949e; }
        .color-purple { fill: #bc8cff; }
        .color-blue { fill: #58a6ff; }
    </style>
    
    <!-- Window Background with Border -->
    <rect width="819" height="517" x="0.5" y="0.5" class="terminal-bg" rx="8"/>
    
    <!-- Header -->
    <path class="terminal-header" d="M 0.5 8 Q 0.5 0.5 8 0.5 L 811.5 0.5 Q 819.5 0.5 819.5 8 L 819.5 32 L 0.5 32 Z" />
    <line x1="0.5" y1="32" x2="819.5" y2="32" stroke="#30363d" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="20" cy="16" r="6" fill="#f85149" />
    <circle cx="40" cy="16" r="6" fill="#d29922" />
    <circle cx="60" cy="16" r="6" fill="#3fb950" />
    
    <!-- Inner Content -->
    <g transform="translate(0, 32)">
        
        <style>
            @keyframes reveal {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            .cmd {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                animation: reveal 0.18s ease-out backwards;
            }
            .header {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                font-weight: 700;
                animation: reveal 0.18s ease-out backwards;
            }
            .cat-title {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                font-weight: 700;
                fill: #c9d1d9;
            }
            .cat-line {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                fill: #8b949e;
                opacity: 1;
            }
            .reveal {
                animation: reveal 0.3s ease-out forwards;
                opacity: 0;
            }
            .cursor {
                animation: cursorBlink 1s steps(2, start) infinite;
            }
            @keyframes cursorBlink {
                50% { opacity: 0; }
            }
        </style>
        <g xml:space="preserve">
        <text x="20" y="34" class="cmd" style="animation-delay: 0.0s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan><tspan class="color-primary"> cat skills.json</tspan></text>
<text x="20" y="76" class="cat-title reveal" style="animation-delay: 0.25s;">Languages</text>
<text x="20" y="94" class="cat-line reveal" style="animation-delay: 0.37s;"><tspan class="color-secondary">C++ • Python • JavaScript • SQL</tspan></text>
<text x="20" y="128" class="cat-title reveal" style="animation-delay: 0.8s;">Big Data & Tools</text>
<text x="20" y="146" class="cat-line reveal" style="animation-delay: 0.92s;"><tspan class="color-secondary">Apache Spark (PySpark) • Hadoop (HDFS) • MapReduce</tspan></text>
<text x="20" y="180" class="cat-title reveal" style="animation-delay: 1.35s;">Web Development</text>
<text x="20" y="198" class="cat-line reveal" style="animation-delay: 1.4700000000000002s;"><tspan class="color-secondary">Flask • React • Node.js</tspan></text>
<text x="20" y="232" class="cat-title reveal" style="animation-delay: 1.9000000000000001s;">Databases</text>
<text x="20" y="250" class="cat-line reveal" style="animation-delay: 2.02s;"><tspan class="color-secondary">MongoDB • MySQL • Firebase</tspan></text>
<text x="20" y="284" class="cat-title reveal" style="animation-delay: 2.45s;">Libraries</text>
<text x="20" y="302" class="cat-line reveal" style="animation-delay: 2.5700000000000003s;"><tspan class="color-secondary">LangChain • HuggingFace • OpenAI</tspan></text>
<text x="20" y="336" class="cat-title reveal" style="animation-delay: 3.0s;">IoT</text>
<text x="20" y="354" class="cat-line reveal" style="animation-delay: 3.12s;"><tspan class="color-secondary">N/A</tspan></text>
<text x="20" y="388" class="cat-title reveal" style="animation-delay: 3.55s;">Cloud</text>
<text x="20" y="406" class="cat-line reveal" style="animation-delay: 3.67s;"><tspan class="color-secondary">N/A</tspan></text>
<text x="20" y="440" class="cat-title reveal" style="animation-delay: 4.1s;">Coursework</text>
<text x="20" y="458" class="cat-line reveal" style="animation-delay: 4.22s;"><tspan class="color-secondary">DSA • OOP • DBMS • OS • CN</tspan></text>
<text x="20" y="498" class="cmd reveal" style="animation-delay: 4.749999999999999s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan> <tspan class="color-primary cursor">█</tspan></text>
</g>
    </g>
</svg>