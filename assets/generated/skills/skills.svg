<svg xmlns="http://www.w3.org/2000/svg" width="820" height="252" viewBox="0 0 820 252">
    <style>
        .terminal-text { font-family: Courier New, monospace; font-size: 14px; fill: #c9d1d9; }
        .terminal-text-bold { font-family: Courier New, monospace; font-size: 14px; font-weight: 700; fill: #c9d1d9; }
        .terminal-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; }
        .terminal-header { fill: #161b22; }
        
        /* Color classes */
        .color-primary { fill: #58a6ff; }
        .color-success { fill: #3fb950; }
        .color-error { fill: #f85149; }
        .color-warning { fill: #d29922; }
        .color-secondary { fill: #8b949e; }
        .color-purple { fill: #bc8cff; }
        .color-blue { fill: #58a6ff; }
    </style>
    
    <!-- Window Background with Border -->
    <rect width="819" height="251" x="0.5" y="0.5" class="terminal-bg" rx="8"/>
    
    <!-- Header -->
    <path class="terminal-header" d="M 0.5 8 Q 0.5 0.5 8 0.5 L 811.5 0.5 Q 819.5 0.5 819.5 8 L 819.5 32 L 0.5 32 Z" />
    <line x1="0.5" y1="32" x2="819.5" y2="32" stroke="#30363d" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="20" cy="16" r="6" fill="#f85149" />
    <circle cx="40" cy="16" r="6" fill="#d29922" />
    <circle cx="60" cy="16" r="6" fill="#3fb950" />
    
    <!-- Inner Content -->
    <g transform="translate(0, 32)">
        
        <style>
            @keyframes fade {
                0% { opacity: 0; }
                100% { opacity: 1; }
            }
            .cmd, .r {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                animation: fade 0.3s backwards;
            }
        </style>
        <g xml:space="preserve">
        <text x="20" y="34" class="cmd" style="animation-delay: 0s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan><tspan class="color-primary"> cat skills.json</tspan></text>
<text x="20" y="74" class="r color-primary" style="animation-delay: 0.4s;">{</text>
<text x="44" y="98" class="r" style="animation-delay: 0.55s;"><tspan class="color-secondary">"Languages":   </tspan><tspan class="color-primary">[ </tspan><tspan class="color-blue">C++, Python, JavaScript, SQL</tspan><tspan class="color-primary"> ]</tspan><tspan class="color-primary">,</tspan></text>
<text x="44" y="122" class="r" style="animation-delay: 0.7000000000000001s;"><tspan class="color-secondary">"Frameworks":  </tspan><tspan class="color-primary">[ </tspan><tspan class="color-blue">Flask, React, Node.js</tspan><tspan class="color-primary"> ]</tspan><tspan class="color-primary">,</tspan></text>
<text x="44" y="146" class="r" style="animation-delay: 0.8500000000000001s;"><tspan class="color-secondary">"Databases":   </tspan><tspan class="color-primary">[ </tspan><tspan class="color-blue">MongoDB, MySQL, Firebase</tspan><tspan class="color-primary"> ]</tspan><tspan class="color-primary">,</tspan></text>
<text x="44" y="170" class="r" style="animation-delay: 1.0s;"><tspan class="color-secondary">"AI Stack":    </tspan><tspan class="color-primary">[ </tspan><tspan class="color-blue">LangChain, HuggingFace, OpenAI</tspan><tspan class="color-primary"> ]</tspan><tspan class="color-primary">,</tspan></text>
<text x="44" y="194" class="r" style="animation-delay: 1.15s;"><tspan class="color-secondary">"Core CS":     </tspan><tspan class="color-primary">[ </tspan><tspan class="color-blue">DSA, OOP, DBMS, OS, CN</tspan><tspan class="color-primary"> ]</tspan></text>
<text x="20" y="218" class="r color-primary" style="animation-delay: 1.2999999999999998s;">}</text>
</g>
    </g>
</svg>