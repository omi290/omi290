<text x="20" y="74" class="r color-secondary" style="animation-delay: 0.30s;">Languages</text>
<text x="20" y="98" class="r" style="animation-delay: 0.34s;"><tspan class="color-primary stagger" style="animation-delay: 0.34s;">C++</tspan><tspan class="color-secondary stagger" style="animation-delay: 0.38s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 0.42s;">Python</tspan><tspan class="color-secondary stagger" style="animation-delay: 0.46s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 0.50s;">JavaScript</tspan><tspan class="color-secondary stagger" style="animation-delay: 0.53s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 0.57s;">SQL</tspan></text>
<text x="20" y="124" class="r color-secondary" style="animation-delay: 0.61s;">Frontend</text>
<text x="20" y="148" class="r" style="animation-delay: 0.65s;"><tspan class="color-primary stagger" style="animation-delay: 0.65s;">HTML</tspan><tspan class="color-secondary stagger" style="animation-delay: 0.69s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 0.73s;">CSS</tspan><tspan class="color-secondary stagger" style="animation-delay: 0.77s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 0.81s;">React</tspan><tspan class="color-secondary stagger" style="animation-delay: 0.85s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 0.89s;">Tailwind CSS</tspan></text>
<text x="20" y="174" class="r color-secondary" style="animation-delay: 0.93s;">Backend</text>
<text x="20" y="198" class="r" style="animation-delay: 0.97s;"><tspan class="color-primary stagger" style="animation-delay: 0.97s;">Flask</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.00s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 1.04s;">Node.js</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.08s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 1.12s;">FastAPI</tspan></text>
<text x="20" y="224" class="r color-secondary" style="animation-delay: 1.16s;">AI / ML</text>
<text x="20" y="248" class="r" style="animation-delay: 1.20s;"><tspan class="color-blue stagger" style="animation-delay: 1.20s;">LangChain</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.24s;"> • </tspan><tspan class="color-blue stagger" style="animation-delay: 1.28s;">OpenAI</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.32s;"> • </tspan><tspan class="color-blue stagger" style="animation-delay: 1.36s;">HuggingFace</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.40s;"> • </tspan><tspan class="color-blue stagger" style="animation-delay: 1.43s;">Scikit-learn</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.47s;"> • </tspan><tspan class="color-blue stagger" style="animation-delay: 1.51s;">Pandas</tspan></text>
<text x="20" y="274" class="r color-secondary" style="animation-delay: 1.55s;">Databases</text>
<text x="20" y="298" class="r" style="animation-delay: 1.59s;"><tspan class="color-primary stagger" style="animation-delay: 1.59s;">MongoDB</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.63s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 1.67s;">MySQL</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.71s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 1.75s;">Oracle</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.79s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 1.83s;">Firebase</tspan></text>
<text x="20" y="324" class="r color-secondary" style="animation-delay: 1.87s;">Cloud & DevOps</text>
<text x="20" y="348" class="r" style="animation-delay: 1.90s;"><tspan class="color-success stagger" style="animation-delay: 1.90s;">AWS</tspan><tspan class="color-secondary stagger" style="animation-delay: 1.94s;"> • </tspan><tspan class="color-success stagger" style="animation-delay: 1.98s;">Docker</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.02s;"> • </tspan><tspan class="color-success stagger" style="animation-delay: 2.06s;">Git</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.10s;"> • </tspan><tspan class="color-success stagger" style="animation-delay: 2.14s;">GitHub</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.18s;"> • </tspan><tspan class="color-success stagger" style="animation-delay: 2.22s;">GCP</tspan></text>
<text x="20" y="374" class="r color-secondary" style="animation-delay: 2.26s;">Developer Tools</text>
<text x="20" y="398" class="r" style="animation-delay: 2.30s;"><tspan class="color-primary stagger" style="animation-delay: 2.30s;">VS Code</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.33s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 2.37s;">Postman</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.41s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 2.45s;">Linux</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.49s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 2.53s;">GitHub Actions</tspan></text>
<text x="20" y="424" class="r color-secondary" style="animation-delay: 2.57s;">Core CS</text>
<text x="20" y="448" class="r" style="animation-delay: 2.61s;"><tspan class="color-primary stagger" style="animation-delay: 2.61s;">Data Structures & Algorithms</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.65s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 2.69s;">Object-Oriented Programming</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.73s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 2.77s;">Database Management Systems</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.80s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 2.84s;">Operating Systems</tspan><tspan class="color-secondary stagger" style="animation-delay: 2.88s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 2.92s;">Computer Networks</tspan></text>
<text x="20" y="474" class="r color-secondary" style="animation-delay: 2.96s;">Embedded / IoT</text>
<text x="20" y="498" class="r" style="animation-delay: 3.00s;"><tspan class="color-primary stagger" style="animation-delay: 3.00s;">ESP32</tspan><tspan class="color-secondary stagger" style="animation-delay: 3.04s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 3.08s;">LoRa</tspan><tspan class="color-secondary stagger" style="animation-delay: 3.12s;"> • </tspan><tspan class="color-primary stagger" style="animation-delay: 3.16s;">MQTT</tspan></text>
<text x="20" y="524" class="r cursor" style="animation-delay: 3.30s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan> <tspan class="color-primary">█</tspan></text>
</g>
    </g>
</svg>