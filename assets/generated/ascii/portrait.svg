<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
    <style>
        .terminal-text { font-family: Courier New, monospace; font-size: 14px; fill: #c9d1d9; }
        .terminal-text-bold { font-family: Courier New, monospace; font-size: 14px; font-weight: 700; fill: #c9d1d9; }
        .terminal-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; }
        .terminal-header { fill: #161b22; }
        
        /* Color classes */
        .color-primary { fill: #58a6ff; }
        .color-success { fill: #3fb950; }
        .color-error { fill: #f85149; }
        .color-warning { fill: #d29922; }
        .color-secondary { fill: #8b949e; }
        .color-purple { fill: #bc8cff; }
    </style>
    
    <!-- Window Background with Border -->
    <rect width="399" height="299" x="0.5" y="0.5" class="terminal-bg" rx="8"/>
    
    <!-- Header -->
    <path class="terminal-header" d="M 0.5 8 Q 0.5 0.5 8 0.5 L 391.5 0.5 Q 399.5 0.5 399.5 8 L 399.5 32 L 0.5 32 Z" />
    <line x1="0.5" y1="32" x2="399.5" y2="32" stroke="#30363d" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="20" cy="16" r="6" fill="#f85149" />
    <circle cx="40" cy="16" r="6" fill="#d29922" />
    <circle cx="60" cy="16" r="6" fill="#3fb950" />
    
    <!-- Inner Content -->
    <g transform="translate(0, 32)">
        
        <style>
            @keyframes typing {
                from { clip-path: inset(0 100% 0 0); }
                to { clip-path: inset(0 0 0 0); }
            }
            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }
            .ascii-row {
                font-family: 'JetBrains Mono', monospace;
                font-size: 12px;
                white-space: pre;
                clip-path: inset(0 100% 0 0);
                animation: typing 0.5s steps(40, end) forwards;
            }
            .cursor {
                animation: blink 1s infinite;
            }
        </style>
        <text x="20" y="52" class="ascii-row" style="animation-delay: 0.5s; fill: #c9d1d9;">     === =======++****+++++++*++ </text>
<text x="20" y="64" class="ascii-row" style="animation-delay: 0.6s; fill: #c9d1d9;">            ===++++**+++==+++**+=</text>
<text x="20" y="76" class="ascii-row" style="animation-delay: 0.7s; fill: #c9d1d9;">    =======+*+++++++++++++++++#*=</text>
<text x="20" y="88" class="ascii-row" style="animation-delay: 0.8s; fill: #c9d1d9;">   +++++++**++==========  ===+*#+</text>
<text x="20" y="100" class="ascii-row" style="animation-delay: 0.9s; fill: #c9d1d9;">   +*******+++========     ===*#+</text>
<text x="20" y="112" class="ascii-row" style="animation-delay: 1.0s; fill: #c9d1d9;">   *###***+++========      ++*##+</text>
<text x="20" y="124" class="ascii-row" style="animation-delay: 1.1s; fill: #c9d1d9;">  =*###**+==========       *####+</text>
<text x="20" y="136" class="ascii-row" style="animation-delay: 1.2000000000000002s; fill: #c9d1d9;"> ==**#*+=     =+===        *#@#*=</text>
<text x="20" y="148" class="ascii-row" style="animation-delay: 1.3s; fill: #c9d1d9;"> ==***+==     =++===       ####*=</text>
<text x="20" y="160" class="ascii-row" style="animation-delay: 1.4s; fill: #c9d1d9;">  =***+=      ++++===      *#@#*=</text>
<text x="20" y="172" class="ascii-row" style="animation-delay: 1.5s; fill: #c9d1d9;">  +***+=     =+++====      *##*+ </text>
<text x="20" y="184" class="ascii-row" style="animation-delay: 1.6s; fill: #c9d1d9;">  =**+=      =++=          =+++= </text>
<text x="20" y="196" class="ascii-row" style="animation-delay: 1.7000000000000002s; fill: #c9d1d9;">  =*+=       =+==          = =+= </text>
<text x="20" y="208" class="ascii-row" style="animation-delay: 1.8s; fill: #c9d1d9;">  =++=       =+=       =      =  </text>
<text x="20" y="220" class="ascii-row" style="animation-delay: 1.9000000000000001s; fill: #c9d1d9;">   ++=       ==                  </text>
<text x="20" y="232" class="ascii-row" style="animation-delay: 2.0s; fill: #c9d1d9;">   ++=                  =        </text>
<text x="20" y="244" class="ascii-row" style="animation-delay: 2.1s; fill: #c9d1d9;">   ===                ====       </text>
<text x="20" y="256" class="ascii-row" style="animation-delay: 2.2s; fill: #c9d1d9;">   =++=             =======      </text>
<text x="20" y="268" class="ascii-row" style="animation-delay: 2.3s; fill: #c9d1d9;">   ++===     =================   </text>
<text x="20" y="280" class="ascii-row" style="animation-delay: 2.4000000000000004s; fill: #c9d1d9;">                                 </text>
<text x="20" y="292" class="ascii-row cursor" style="animation-delay: 3.0s; fill: #c9d1d9;">█</text>

    </g>
</svg>