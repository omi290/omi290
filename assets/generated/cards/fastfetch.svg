<svg xmlns="http://www.w3.org/2000/svg" width="820" height="324" viewBox="0 0 820 324">
    <style>
        .terminal-text { font-family: Courier New, monospace; font-size: 14px; fill: #c9d1d9; }
        .terminal-text-bold { font-family: Courier New, monospace; font-size: 14px; font-weight: 700; fill: #c9d1d9; }
        .terminal-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; }
        .terminal-header { fill: #161b22; }
        
        /* Color classes */
        .color-primary { fill: #58a6ff; }
        .color-success { fill: #3fb950; }
        .color-error { fill: #f85149; }
        .color-warning { fill: #d29922; }
        .color-secondary { fill: #8b949e; }
        .color-purple { fill: #bc8cff; }
        .color-blue { fill: #58a6ff; }
    </style>
    
    <!-- Window Background with Border -->
    <rect width="819" height="323" x="0.5" y="0.5" class="terminal-bg" rx="8"/>
    
    <!-- Header -->
    <path class="terminal-header" d="M 0.5 8 Q 0.5 0.5 8 0.5 L 811.5 0.5 Q 819.5 0.5 819.5 8 L 819.5 32 L 0.5 32 Z" />
    <line x1="0.5" y1="32" x2="819.5" y2="32" stroke="#30363d" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="20" cy="16" r="6" fill="#f85149" />
    <circle cx="40" cy="16" r="6" fill="#d29922" />
    <circle cx="60" cy="16" r="6" fill="#3fb950" />
    
    <!-- Inner Content -->
    <g transform="translate(0, 32)">
        
        <style>
            @keyframes t {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes b {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }
            .r {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                opacity: 1;
                animation: t 0.15s linear forwards;
            }
            .c { animation: b 1s infinite; }
        </style>
        <g xml:space="preserve">
        <text x="20" y="34" class="r" style="animation-delay: 0s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan><tspan class="color-primary"> fastfetch</tspan></text>
<text x="20" y="76" class="r color-primary" style="animation-delay: 0.2s;"><tspan class="color-secondary">OS               </tspan>GitHub</text>
<text x="20" y="100" class="r color-primary" style="animation-delay: 0.28s;"><tspan class="color-secondary">User             </tspan>Om Prakash Barmola</text>
<text x="20" y="124" class="r color-primary" style="animation-delay: 0.36s;"><tspan class="color-secondary">Role             </tspan>Software Engineer</text>
<text x="20" y="148" class="r color-primary" style="animation-delay: 0.44s;"><tspan class="color-secondary">Specialization   </tspan>AI-powered Applications</text>
<text x="20" y="172" class="r color-secondary" style="animation-delay: 0.52s;"><tspan class="color-secondary">Education        </tspan>Computer Science (AI &amp; Data Science)</text>
<text x="20" y="196" class="r color-secondary" style="animation-delay: 0.6000000000000001s;"><tspan class="color-secondary">College          </tspan>Graphic Era Hill University</text>
<text x="20" y="220" class="r color-blue" style="animation-delay: 0.6799999999999999s;"><tspan class="color-secondary">Languages        </tspan>C • C++ • Java • Python • JavaScript • SQL</text>
<text x="20" y="244" class="r color-blue" style="animation-delay: 0.76s;"><tspan class="color-secondary">Core Coursework  </tspan>Data Structures &amp; Algorithms • Operating Systems • DBMS • Object-Oriented Programming</text>
<text x="20" y="268" class="r color-success" style="animation-delay: 0.8400000000000001s;"><tspan class="color-secondary">Achievements     </tspan>Graph-e-thon Runner-up</text>
<text x="20" y="304" class="r c" style="animation-delay: 1.0699999999999998s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan> <tspan class="color-primary">█</tspan></text>
</g>
    </g>
</svg>