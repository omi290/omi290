<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420">
    <style>
        .terminal-text { font-family: Courier New, monospace; font-size: 14px; fill: #c9d1d9; }
        .terminal-text-bold { font-family: Courier New, monospace; font-size: 14px; font-weight: 700; fill: #c9d1d9; }
        .terminal-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; }
        .terminal-header { fill: #161b22; }
        
        /* Color classes */
        .color-primary { fill: #58a6ff; }
        .color-success { fill: #3fb950; }
        .color-error { fill: #f85149; }
        .color-warning { fill: #d29922; }
        .color-secondary { fill: #8b949e; }
        .color-purple { fill: #bc8cff; }
        .color-blue { fill: #58a6ff; }
    </style>
    
    <!-- Window Background with Border -->
    <rect width="819" height="419" x="0.5" y="0.5" class="terminal-bg" rx="8"/>
    
    <!-- Header -->
    <path class="terminal-header" d="M 0.5 8 Q 0.5 0.5 8 0.5 L 811.5 0.5 Q 819.5 0.5 819.5 8 L 819.5 32 L 0.5 32 Z" />
    <line x1="0.5" y1="32" x2="819.5" y2="32" stroke="#30363d" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="20" cy="16" r="6" fill="#f85149" />
    <circle cx="40" cy="16" r="6" fill="#d29922" />
    <circle cx="60" cy="16" r="6" fill="#3fb950" />
    
    <!-- Inner Content -->
    <g transform="translate(0, 32)">
        
        <style>
            @keyframes typing {
                from { clip-path: inset(0 100% 0 0); }
                to { clip-path: inset(0 0 0 0); }
            }
            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }
            .ff-row {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                white-space: pre;
                clip-path: inset(0 100% 0 0);
                animation: typing 0.4s steps(50, end) forwards;
            }
            .cursor {
                animation: blink 1s infinite;
            }
        </style>
        <text x="20" y="34" class="ff-row" style="animation-delay: 0s;"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan><tspan class="color-primary"> fastfetch</tspan></text>
<text x="20" y="76" class="ff-row" style="animation-delay: 0.5s;" xml:space="preserve"><tspan class="color-success">OS              </tspan><tspan class="color-primary">GitHub</tspan></text>
<text x="20" y="100" class="ff-row" style="animation-delay: 0.6s;" xml:space="preserve"><tspan class="color-success">Host            </tspan><tspan class="color-primary">Graphic Era Hill University</tspan></text>
<text x="20" y="124" class="ff-row" style="animation-delay: 0.7s;" xml:space="preserve"><tspan class="color-success">Role            </tspan><tspan class="color-primary">Software Engineer</tspan></text>
<text x="20" y="148" class="ff-row" style="animation-delay: 0.8s;" xml:space="preserve"><tspan class="color-success">Specialization  </tspan><tspan class="color-primary">AI-powered Applications</tspan></text>
<text x="20" y="172" class="ff-row" style="animation-delay: 0.9s;" xml:space="preserve"><tspan class="color-success">Languages       </tspan><tspan class="color-primary">C++ Python JavaScript SQL</tspan></text>
<text x="20" y="196" class="ff-row" style="animation-delay: 1.0s;" xml:space="preserve"><tspan class="color-success">Frameworks      </tspan><tspan class="color-primary">Flask React Node.js</tspan></text>
<text x="20" y="220" class="ff-row" style="animation-delay: 1.1s;" xml:space="preserve"><tspan class="color-success">Databases       </tspan><tspan class="color-primary">MongoDB MySQL Firebase</tspan></text>
<text x="20" y="244" class="ff-row" style="animation-delay: 1.2000000000000002s;" xml:space="preserve"><tspan class="color-success">AI Stack        </tspan><tspan class="color-primary">LangChain HuggingFace OpenAI</tspan></text>
<text x="20" y="268" class="ff-row" style="animation-delay: 1.3s;" xml:space="preserve"><tspan class="color-success">Core CS         </tspan><tspan class="color-primary">DSA OOP DBMS OS CN</tspan></text>
<text x="20" y="292" class="ff-row" style="animation-delay: 1.4s;" xml:space="preserve"><tspan class="color-success">Projects        </tspan><tspan class="color-primary">SafeMine | AI Assignment Evaluator</tspan></text>
<text x="20" y="316" class="ff-row" style="animation-delay: 1.5s;" xml:space="preserve"><tspan class="color-success">Achievements    </tspan><tspan class="color-primary">Graph-e-thon Runner-up</tspan></text>
<text x="20" y="340" class="ff-row" style="animation-delay: 1.6s;" xml:space="preserve"><tspan class="color-success">LeetCode        </tspan><tspan class="color-primary">250+ Problems</tspan></text>
<text x="20" y="364" class="ff-row" style="animation-delay: 1.7000000000000002s;" xml:space="preserve"><tspan class="color-success">Status          </tspan><tspan class="color-primary">Building useful software.</tspan></text>
<text x="20" y="400" class="ff-row cursor" style="animation-delay: 2.2s;" xml:space="preserve"><tspan class="color-success">om@github</tspan><tspan class="color-primary">:</tspan><tspan class="color-blue">~$</tspan> <tspan class="color-primary">█</tspan></text>

    </g>
</svg>